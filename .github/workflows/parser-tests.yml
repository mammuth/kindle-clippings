name: Parser Tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  kindle-parser-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run parser matrix tests
        run: python -m unittest clipping_manager.test_kindle_parser -v
